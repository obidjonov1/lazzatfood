<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #overlay {
        display: none;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1;
        background: rgba(0, 0, 0, 0.3);
        width: 100%;
        height: 100%;
        touch-action: none;
        backdrop-filter: blur(3px);
      }
      #modal {
        margin: auto;
        background-color: #fff;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      img {
        width: 100%;
      }
      #show-modal-btn {
        width: 10%;
      }
    </style>
  </head>
  <body>
    <div class="meall">
      <img id="show-modal-btn" src="./assets/images/img.jpeg" alt="" />
    </div>
    <div id="overlay">
      <div id="modal">
        <button id="close-modal-btn">Close modal</button>
        <img src="./assets/images/img2.jpeg" alt="" />
      </div>
    </div>

    <script>
      // const overlay = document.querySelector("#overlay");
      // const modal = document.querySelector(".modal");
      // const overlayTwo = document.querySelector(".overlay");

      // document
      //   .querySelector("#show-modal-btn")
      //   .addEventListener("click", () => {
      //     overlay.style.display = "block";
      //   });

      // document
      //   .querySelector("#close-modal-btn")
      //   .addEventListener("click", () => {
      //     overlay.style.display = "none";
      //   });

      const overlay = document.querySelector("#overlay");

      document
        .querySelector("#show-modal-btn")
        .addEventListener("click", () => {
          overlay.style.display = "block";
        });

      document
        .querySelector("#close-modal-btn")
        .addEventListener("click", () => {
          overlay.style.display = "none";
        });
    </script>
  </body>
</html>
